<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeGrid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-mesh"></div>
    <div class="app-layout">
        <aside class="glass-panel sidebar">
            <div class="logo-container">
                <svg viewBox="0 0 100 100" width="35" height="35">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#ffffff" stroke-width="4"/>
                    <path d="M 30 50 L 50 70 L 70 30" stroke="#ffffff" stroke-width="6" fill="none"stroke-linecap="round"/> 
                </svg>
                <h2>VibeGrid</h2>
            </div>
            <div class="menu-section">
                <h3>My Playlist</h3>
                <ul id="playlist-container"></ul>
            </div>
            <div class="menu-section">
                <h3>History</h3>
                <ul id="history-container"></ul>
            </div>
        </aside>

        <main class="glass-panel main-content">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search any artist or track...">
                <button id="search-btn">Discover</button>
            </div>
            <div class="results-grid" id="results-grid">
                <div class="empty-state">Search to discover vibrant new music previews...</div>
            </div>
        </main>

        <aside class="glass-panel lyrics-panel">
            <h3>Live Lyrics</h3>
            <div class="lyrics-wrapper">
                <div class="lyrics-container" id="lyrics-container">
                    <p class="empty-state">Click a track to play audio and load real lyrics.</p>
                </div>
                <button id="resume-scroll-btn">Resume Sync</button>
            </div>
        </aside>

        <footer class="glass-panel player-bar">
            <div class="now-playing" id="now-playing">
                <img id="np-image" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Cover">
                <div class="np-info">
                    <div class="np-title" id="np-title">NO TRACK SELECTED</div>
                    <div class="np-artist" id="np-artist">Search and click to play</div>
                </div>
            </div>
            <div class="controls">
                <button id="play-pause-btn">Play</button>
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
            <div class="actions">
                <button id="add-playlist-btn">Save to Playlist</button>
            </div>
        </footer>
    </div>
    <audio id="audio-player" style="display: none;"></audio>
    <script src="script.js"></script>
</body>
</html>
